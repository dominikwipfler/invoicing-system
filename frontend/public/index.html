<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rechnungsverarbeitung — Cockpit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-text">📄 <span class="logo-accent">Invoicing</span> System</div>
      <h1>Rechnungsverarbeitung — Cockpit</h1>
    </div>
    <div class="header-right">
      <button id="theme-toggle-btn" class="btn btn-secondary btn-lg" title="Design wechseln">🌙</button>
      <button id="shutdown-btn" class="btn btn-danger btn-lg">🔴 Herunterfahren</button>
    </div>
  </header>

  <!-- Aktionsleiste -->
  <div class="action-bar-wrapper">
    <div class="action-bar">
      <button id="trigger-standard" class="btn btn-primary btn-action">▶ Standard-Rechnung</button>
      <button id="trigger-compliance" class="btn btn-warning btn-action">⚠ Compliance-Fall</button>
      <button id="open-tasklist" class="btn btn-secondary btn-action">📋 Tasklist öffnen</button>
      <button id="open-operate" class="btn btn-secondary btn-action">🔍 Operate öffnen</button>
    </div>
    <div id="trigger-status" class="status-message"></div>
  </div>

  <!-- Live-Status / Historie Panel -->
  <main class="container">
    <div class="card">
      <div class="card-header">
        <div>
          <h2>Live-Status</h2>
          <p class="card-subtitle">Prozessfortschritt (aktualisiert alle 2 Sekunden)</p>
        </div>
        <div class="mode-toggle">
          <button id="mode-live" class="mode-btn active" data-mode="live">🔴 Live</button>
          <button id="mode-history" class="mode-btn" data-mode="history">📜 Historie</button>
        </div>
      </div>

      <div id="live-case-indicator" class="case-indicator" style="display:none;">
        Verfolge: <strong id="live-case-id">-</strong>
      </div>

      <div id="event-log" class="event-log">
        <div class="event-placeholder">Warte auf Ereignisse...</div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
